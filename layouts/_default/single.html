{{ define "main" }}
{{/* A standing page (About / Now / Hello / Subscribe), read as a Catalog plate. */}}
<article class="reading-plate reading-plate--standing">
  {{ if .Title }}<h1 class="plate-title">{{ .Title }}</h1>{{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>

  {{ partial "reading/colophon.html" . }}
</article>
{{ end }}
